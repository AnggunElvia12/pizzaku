<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaku - Pizza Panjang</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET & GENERAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
        }

        /* HEADER SECTION */
        .header {
            background-color: #e30613;
            color: white;
            padding: 40px 20px;
            text-align: left;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-content { z-index: 2; width: 60%; }
        .logo-placeholder { font-weight: 800; font-size: 1.5rem; color: #ffcc00; margin-bottom: 10px; }
        .tagline { font-style: italic; font-size: 0.9rem; }
        .main-title { font-size: 2.5rem; font-weight: 800; line-height: 1; }
        .main-title span { color: #ffcc00; }
        .sub-title { font-size: 1.2rem; font-weight: 700; margin-top: 5px; text-transform: uppercase; }
        .description { font-size: 0.75rem; margin-top: 15px; max-width: 250px; }
        .header-image { position: absolute; right: -20px; top: 20px; width: 50%; transform: rotate(-15deg); border-radius: 20px; }

        /* ORDER SECTION */
        .order-section { padding: 40px 20px; text-align: center; }
        .section-title {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 700; margin-bottom: 30px; font-size: 1.1rem; color: #e30613;
        }
        .section-title::before, .section-title::after { content: ""; height: 2px; width: 40px; background-color: #e30613; }

        .order-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        
        .order-card {
            background: white; padding: 15px 5px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.2s; text-decoration: none;
        }
        .order-card:active { transform: scale(0.95); }

        /* SVG Logo Sizing */
        .svg-logo { height: 40px; width: 40px; margin-bottom: 10px; }

        .btn-order {
            font-size: 0.6rem; color: white; padding: 6px 5px;
            border-radius: 6px; width: 90%; font-weight: 600;
        }
        .bg-gofood { background-color: #EE272C; }
        .bg-grabfood { background-color: #00B14F; }
        .bg-shopeefood { background-color: #EE4D2D; }

        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .contact-card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center;
            text-decoration: none; color: #333;
        }
        .svg-contact { width: 35px; height: 35px; margin-bottom: 8px; }

        .btn-contact { display: block; font-size: 0.8rem; color: white; padding: 8px; border-radius: 6px; margin-top: 10px; font-weight: 600; }
        .bg-wa { background-color: #25D366; }
        .bg-loc { background-color: #EA4335; }

        /* MENU & ABOUT */
        .menu-section { text-align: center; padding: 30px 20px; }
        .btn-menu {
            display: inline-block; background-color: #e30613; color: white;
            padding: 12px 50px; border-radius: 30px; font-weight: 700;
            box-shadow: 0 4px 10px rgba(227, 6, 19, 0.3);
            text-decoration: none;
        }
        .about-section { padding: 30px 20px; font-size: 0.85rem; color: #666; text-align: center; }

        /* FOOTER */
        .footer {
            background-color: #e30613; color: white; padding: 25px 20px;
            display: flex; flex-direction: column; gap: 15px; font-size: 0.8rem;
        }
        .footer-item { display: flex; align-items: center; gap: 12px; }
        .footer-svg { width: 20px; height: 20px; fill: white; }

        @media (max-width: 480px) {
            .main-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

        <!-- HEADER -->

            </div>
        </section>

        <!-- MENU SECTION -->
        <section class="menu-section">
            <a href="#" class="btn-menu">LIHAT MENU</a>

</body>
